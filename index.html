<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sweta's Spiritual Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
            background: url('https://images.unsplash.com/photo-1635323281206-382928503893?q=80&w=1920') no-repeat center center/cover;
            background-attachment: fixed; background-color: #000; overflow: hidden;
        }

        #counter-box {
            position: absolute; cursor: move; padding: 25px;
            text-align: center; width: 320px; z-index: 100;
            user-select: none; background: transparent;
        }

        #mantra-name {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            color: #00f2ff;
            text-align: center;
            font-size: 18px;
            padding: 10px;
            width: 90%;
            margin-bottom: 10px;
            outline: none;
            backdrop-filter: blur(10px);
        }

        #display-name {
            font-size: 26px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
            min-height: 35px;
            font-weight: bold;
        }

        #display {
            font-size: clamp(90px, 20vw, 130px);
            font-weight: 900;
            color: white;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
            line-height: 1;
        }

        .btn-group { display: flex; justify-content: space-around; gap: 15px; margin-bottom: 25px; }

        .action-btn {
            background: rgba(255, 255, 255, 0.1); border: 2px solid white;
            color: white; cursor: pointer; display: flex;
            justify-content: center; align-items: center;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(10px);
        }

        .circle-btn { width: 80px; height: 80px; font-size: 40px; border-radius: 50%; }
        .rect-btn { width: 100%; padding: 14px; font-size: 13px; border-radius: 15px; margin-top: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .action-btn:active { transform: scale(0.85); background: rgba(255, 255, 255, 0.4); }
        .refresh-btn { border-color: #ff4d4d; color: #ff4d4d; }
        .bg-btn { border-color: #00f2ff; color: #00f2ff; }

        .footer-text { margin-top: 25px; font-size: 12px; color: white; letter-spacing: 2px; font-weight: bold; text-shadow: 1px 1px 4px #000; }
    </style>
</head>
<body>

    <div id="counter-box">
        <input type="text" id="mantra-name" placeholder="Name Likhein..." oninput="updateName()">
        <div id="display-name">RADHA</div>
        
        <div id="display">0</div>
        
        <div class="btn-group">
            <button class="action-btn circle-btn" onclick="updateCount(-1, event)">−</button>
            <button class="action-btn circle-btn" onclick="updateCount(1, event)">+</button>
        </div>

        <button class="action-btn rect-btn refresh-btn" onclick="resetCounter(event)">🔄 Reset Count</button>
        
        <label>
            <input type="file" id="image_input" accept="image/*" style="display:none;">
            <div class="action-btn rect-btn bg-btn">📷 Change Background</div>
        </label>

        <div class="footer-text">CREATED BY SWETA KUMARI ✨</div>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('savedCount')) || 0;
        const display = document.getElementById('display');
        const displayName = document.getElementById('display-name');
        const mantraInput = document.getElementById('mantra-name');
        const box = document.getElementById('counter-box');

        // Setup
        display.innerText = count;
        const savedName = localStorage.getItem('savedMantraName') || "RADHA";
        mantraInput.value = savedName;
        displayName.innerText = savedName;

        function updateName() {
            const name = mantraInput.value.toUpperCase() || "JAAP";
            displayName.innerText = name;
            localStorage.setItem('savedMantraName', name);
        }

        function updateCount(val, e) {
            if(e) e.stopPropagation();
            count += val;
            if(count < 0) count = 0;
            display.innerText = count;
            localStorage.setItem('savedCount', count);
            
            // Vibration
            if (navigator.vibrate) navigator.vibrate(50);

            // Voice Count - Isse AI number bolega
            speak(count);

            // Celebration at 108
            if(count > 0 && count % 108 === 0) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }
        }

        function speak(text) {
            // Browser voice support check
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.rate = 1.3; // Speed thodi fast rakhi hai counting ke liye
                msg.pitch = 1;
                window.speechSynthesis.cancel(); // Pichli voice ko stop karke nayi bolne ke liye
                window.speechSynthesis.speak(msg);
            }
        }

        function resetCounter(e) {
            e.stopPropagation();
            if(confirm("Zero karein?")) {
                count = 0;
                display.innerText = count;
                localStorage.setItem('savedCount', count);
                window.speechSynthesis.cancel();
            }
        }

        // --- Dragging System ---
        let isDragging = false, startX, startY, initX, initY;

        function startDragging(e) {
            if (['BUTTON', 'INPUT'].includes(e.target.tagName) || e.target.closest('label')) return;
            isDragging = true;
            const evt = e.type === 'touchstart' ? e.touches[0] : e;
            startX = evt.clientX; startY = evt.clientY;
            initX = box.offsetLeft; initY = box.offsetTop;
        }

        function drag(e) {
            if (!isDragging) return;
            const evt = e.type === 'touchmove' ? e.touches[0] : e;
            box.style.left = (initX + (evt.clientX - startX)) + 'px';
            box.style.top = (initY + (evt.clientY - startY)) + 'px';
            box.style.bottom = 'auto'; box.style.right = 'auto';
        }

        box.addEventListener('mousedown', startDragging);
        box.addEventListener('touchstart', startDragging);
        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        // Background Loading
        window.onload = function() {
            const bg = localStorage.getItem('userBackground');
            if (bg) document.body.style.backgroundImage = `url(${bg})`;
        };

        document.getElementById("image_input").addEventListener("change", function() {
            const reader = new FileReader();
            reader.onload = () => {
                const imgData = reader.result;
                document.body.style.backgroundImage = `url(${imgData})`;
                localStorage.setItem('userBackground', imgData);
            };
            reader.readAsDataURL(this.files[0]);
        });
    </script>
</body>
</html>
